# Real-model head-to-head: milli.run vs a local LLM agent.
#
# Unlike mvp_30.yaml (which runs the offline ScriptedLLMClient stand-in), this
# config puts milli.run against a real local model through the OllamaClient adapter.
#
# Prerequisites:
#   ollama serve                              # if the Ollama service is not already running
#   ollama ls                                 # confirm gemma4:12b-mlx is present
#   export SHOPWORLD_LLM_MODEL=gemma4:12b-mlx # optional; this is the default
#   export OLLAMA_HOST=http://127.0.0.1:11434 # optional; this is the default
#
# Run:
#   uv run python experiments/run_benchmark.py --config experiments/configs/mvp_real_llm.yaml \
#       --out experiments/reports/results_real_llm.json
#
# If Ollama is not reachable or the model is missing, llm_agent_ollama is skipped
# (not fatal) and you get a milli_run-only run. See
# docs/go-to-market/BENCHMARK_REAL_MODEL_RUN.md before publishing any figure from
# this — the scenario set still needs hardening.

agents:
  - milli_run
  - llm_agent_ollama

seeds: [1, 2, 3]

max_steps: 25
